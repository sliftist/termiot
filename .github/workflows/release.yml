name: Release

# Unsigned by design — signing is a deliberate non-goal for now; the release exe is built fresh on the runner from the tagged commit.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Publish single-file exe
        run: dotnet publish Termiot -c Release -o dist

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        # RELEASE_NOTES.md is written by scripts/publish-release.js (generated from the diff) and committed with the release; the fallback covers tags from before that existed.
        run: |
          if (Test-Path RELEASE_NOTES.md) { gh release create ${{ github.ref_name }} dist/Termiot.exe --title "Termiot ${{ github.ref_name }}" --notes-file RELEASE_NOTES.md } else { gh release create ${{ github.ref_name }} dist/Termiot.exe --title "Termiot ${{ github.ref_name }}" --generate-notes }
